version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: crm_postgres

    environment:
      POSTGRES_DB: ${DB_NAME:-crm_db}
      POSTGRES_USER: ${DB_USER:-crm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_secure_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"

    volumes:
      # Persistent data
      - postgres_data:/var/lib/postgresql/data

      # Schema initialization
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

      # PostgreSQL configuration
      - ./postgres.conf:/etc/postgresql/postgresql.conf:ro

    ports:
      - "5432:5432"

    networks:
      - crm_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-crm_user} -d ${DB_NAME:-crm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm_backend

    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:-crm_user}:${DB_PASSWORD:-your_secure_password}@postgres:5432/${DB_NAME:-crm_db}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-crm_db}
      DB_USER: ${DB_USER:-crm_user}
      DB_PASSWORD: ${DB_PASSWORD:-your_secure_password}

      # Server
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001

      # JWT
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_key_min_32_chars_required}
      JWT_EXPIRATION: 3600

      # SMTP (Email)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-your-email@gmail.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-your-app-password}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@crm.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-CRM System}
      ENABLE_EMAIL_NOTIFICATIONS: ${ENABLE_EMAIL_NOTIFICATIONS:-true}

      # Frontend
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}

    ports:
      - "3001:3001"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - crm_network

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Frontend Service (Optional - for development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crm_frontend

    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
      NODE_ENV: ${NODE_ENV:-production}

    ports:
      - "3000:3000"

    depends_on:
      - backend

    networks:
      - crm_network

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Optional: Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: crm_nginx

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

    depends_on:
      - backend
      - frontend

    networks:
      - crm_network

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

volumes:
  postgres_data:
    driver: local

networks:
  crm_network:
    driver: bridge
